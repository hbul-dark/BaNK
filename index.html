<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Question Bank Pro By ARE</title>

<script>

<style>
/* Base Styles - Clean White Theme */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { 
  overflow-x: hidden; 
  width: 100%;
}
body { 
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
  margin: 0; 
  background: #ffffff; /* White Background */
  color: #000000; /* Black Text */
  padding: 10px; 
  display: flex;
  flex-direction: column;
  align-items: center;
}
.container { 
  width: 100%; 
  max-width: 800px; 
}

h2 { text-align: center; color: #000000; font-size: 1.4rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

/* Inputs & Buttons - Professional Grey/Black Accents */
select, button { 
  width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; 
  border: 1.5px solid #cccccc; font-size: 16px; 
  background: #ffffff; color: #000000;
  text-align: center;
  transition: all 0.3s ease;
}
button { 
  background: #000000; color: #ffffff; border: none; 
  font-weight: 700; cursor: pointer; 
}
button:hover { background: #333333; }
button:disabled { background: #cccccc; color: #666666; cursor: not-allowed; }
#stopBtn { background: #c0392b; color: #fff; display: none; }

/* Question Cards */
.question-card { 
  padding: 20px; border-radius: 12px; margin-bottom: 20px; 
  background: #f9f9f9; border: 1px solid #eeeeee; 
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
  line-height: 1.7;
  word-wrap: break-word;
}
.q-header { display: flex; align-items: flex-start; gap: 12px; font-size: 17px; color: #000000; font-weight: 500; }
.meta-info { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }

/* Image Styling */
.q-image { 
  max-width: 100%; 
  height: auto; 
  display: block; 
  margin: 15px auto; 
  border-radius: 8px; 
  border: 1px solid #ddd;
  background: #ffffff; 
}

/* Badges */
.badge {
  background: #f0f0f0; color: #333333; padding: 4px 10px;
  border-radius: 6px; font-size: 0.75rem; border: 1px solid #ccc;
  font-weight: 600;
}

/* Options */
.vertical-options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
.option-row { 
  display: flex; gap: 12px; align-items: flex-start; 
  padding: 8px; border-radius: 6px; background: #ffffff; border-bottom: 1px solid #f0f0f0;
}
.option-label { font-weight: bold; min-width: 30px; color: #000000; }

/* Tabs */
.tabs { display: flex; gap: 12px; margin: 20px 0; width: 100%; }
.tab { 
  flex: 1; padding: 12px; background: #ffffff; border: 1.5px solid #000000;
  border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; color: #000000;
}
.tab.active { background: #000000; color: #ffffff; }
.hidden { display: none; }

marquee { color: #000000; background: #ffffff; padding: 8px 0; width: 100%; border-radius: 4px; font-size: 0.9rem; }
#status { text-align: center; font-weight: bold; color: #333333; margin: 15px 0; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="container">
  <h2>📖 QUESTION STORE</h2>
  <marquee>
  <span>| NOTE : Dear user this site created by Author 'ARE' for your education exploration. Thank You.. |</span></marquee>
  
  <select id="subjectSelect"><option value="">LOADING</option></select>
  <select id="chapterSelect" disabled><option value="">SELECT CHAPTER</option></select>
  <select id="typeSelect" disabled><option value="">SELECT FILTER TYPE</option></select>

  <button id="fetchBtn" disabled onclick="startFetching()">Search Questions</button>
  <button id="stopBtn" onclick="stopFetching()">Stop Searching</button>
  
  <div id="status">READY</div>

  <div class="tabs" style="display:none;" id="tabs">
    <div class="tab active" onclick="showTab('all', event)">All</div>
    <div class="tab" onclick="showTab('selected', event)">Selected</div>
  </div>

  <div id="allTab"></div>
  <div id="selectedTab" class="hidden"></div>
</div>

<script>
// Change const to let so we can update it
const API_BASE = "https://daricomma.com/api";
// We use 'let' so the token can be updated when it expires
let AUTH_TOKEN = "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyZWdpc3RyYXRpb25fZGF0ZSI6IjIwMjQtMDEtMjlUMDk6NTc6NDMuMjg2WiIsImlkIjoiMzczN2FjMjYtNjYyNS00MzJmLTgzMTktNmJmNTJmM2NhNDFjIiwiZnVsbG5hbWUiOiJSYXNlbCIsInJvbGUiOiJ2aXNpdG9yIiwiZW1haWwiOm51bGwsIm1vYmlsZSI6IjAxODE3MTY2MTY4IiwiaHR0cHM6Ly9oYXN1cmEuaW8vand0L2NsYWltcyI6eyJ4LWhhc3VyYS1hbGxvd2VkLXJvbGVzIjpbInZpc2l0b3IiXSwieC1oYXN1cmEtZGVmYXVsdC1yb2xlIjoidmlzaXRvciIsIngtaGFzdXJhLXVzZXItaWQiOiIzNzM3YWMyNi02NjI1LTQzMmYtODMxOS02YmY1MmYzY2E0MWMiLCJ4LWhhc3VyYS11c2VyLXJvbGUiOiJ2aXNpdG9yIiwieC1oYXN1cmEtdXNlci1lbWFpbCI6bnVsbCwieC1oYXN1cmEtdXNlci1tb2JpbGUiOiIwMTgxNzE2NjE2OCJ9LCJ0b2tlblR5cGUiOiJhY2Nlc3MiLCJpYXQiOjE3NzY4Mzc4NzIsImV4cCI6MTc3NzQ0MjY3Mn0.Q4f9WXun23iO4U5wCJQAAdhFVgC4Q5Q60rUZjHjljYA";

let subjectData = [], isFetching = false, globalCount = 1;
const BENGALI_LABELS = ['ক.', 'খ.', 'গ.', 'ঘ.', 'ঙ.', 'চ.'];

// NEW: Function to login and get a fresh token automatically
async function refreshLogin() {
    console.log("Token expired. Logging in again...");
    try {
        const res = await fetch(`https://daricomma.com/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                'mobile': '01751026914',
                'password': '1c82b2323dc083bd812874536294e45bb678213f1cc52d880e80e6da6c39ff8c'
            })
        });
        const data = await res.json();
        if (data.access_token) {
            AUTH_TOKEN = `Bearer ${data.access_token}`;
            return true;
        }
    } catch (e) {
        console.error("Auto-login failed", e);
    }
    return false;
}

// NEW: Smart fetcher that handles the "Expired" error
async function smartFetch(url) {
    let res = await fetch(url, { 
        headers: { "Authorization": AUTH_TOKEN, "Accept": "application/json" } 
    });

    if (res.status === 401) { // 401 means "Token Expired"
        const success = await refreshLogin();
        if (success) {
            // Try again with the brand new token
            res = await fetch(url, { 
                headers: { "Authorization": AUTH_TOKEN, "Accept": "application/json" } 
            });
        }
    }
    return res;
}

function getCleanContent(data) {
  if (!data || data === "undefined") return "";
  if (data.blocks) {
    let html = "";
    const entityMap = data.entityMap || {};
    data.blocks.forEach((block, index) => {
      let txt = block.text || "";
      html += (index === 0) ? `<span>${txt}</span>` : `<div>${txt}</div>`;
      if (block.entityRanges) {
        block.entityRanges.forEach(range => {
          const entity = entityMap[range.key];
          if (entity?.type === 'IMAGE' && entity.data?.src) html += `<img src="${entity.data.src}" class="q-image">`;
        });
      }
    });
    return html;
  }
  return typeof data === 'string' ? data : (data.text || "");
}

async function init() {
  try {
    const res = await smartFetch(`${API_BASE}/field`);
    const json = await res.json();
    json.data.curriculums.forEach(c => c.versions.forEach(v => v.classes.forEach(cls => {
      (cls.groups || []).forEach(g => subjectData.push(...g.subjects));
      subjectData.push(...(cls.subjects || []));
    })));
    const subSelect = document.getElementById('subjectSelect');
    subSelect.innerHTML = '<option value="">SUBJECT</option>';
    subjectData.forEach((s, i) => subSelect.innerHTML += `<option value="${i}">${s.name}</option>`);
  } catch (e) { document.getElementById('status').innerText = "Load Error."; }
}

document.getElementById('subjectSelect').onchange = e => {
  const chaps = subjectData[e.target.value]?.chapters || [];
  const chapSelect = document.getElementById('chapterSelect');
  chapSelect.innerHTML = '<option value="">CHAPTER</option>';
  chaps.forEach(c => chapSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`);
  chapSelect.disabled = false;
};

document.getElementById('chapterSelect').onchange = async (e) => {
  const chapterId = e.target.value;
  const typeSelect = document.getElementById('typeSelect');
  if (!chapterId) return;
  document.getElementById('status').innerText = "LOADING FILTERS...";
  try {
    const res = await smartFetch(`${API_BASE}/question/filter-options/${chapterId}`);
    const json = await res.json();
    
    typeSelect.innerHTML = '<option value="">SELECT FILTER</option>';
    const categories = ['types', 'years', 'sub_sources', 'levels', 'tags'];
    
    categories.forEach(cat => {
      if (json[cat] && json[cat].length > 0) {
        const group = document.createElement('optgroup');
        group.label = cat.toUpperCase().replace('_', ' ');
        json[cat].forEach(item => {
          const option = document.createElement('option');
          option.value = item.id;
          option.innerText = item.name;
          const paramKey = (cat === 'types') ? 'question_type_id[]' : `${cat.slice(0, -1)}_id[]`;
          option.setAttribute('data-param', paramKey);
          group.appendChild(option);
        });
        typeSelect.appendChild(group);
      }
    });
    typeSelect.disabled = false;
    document.getElementById('status').innerText = "READY";
  } catch (err) { document.getElementById('status').innerText = "FILTER ERROR"; }
};

document.getElementById('typeSelect').onchange = e => {
  document.getElementById('fetchBtn').disabled = !e.target.value;
};

function stopFetching() { isFetching = false; }

async function startFetching() {
  isFetching = true;
  globalCount = 1;
  const chapterId = document.getElementById('chapterSelect').value;
  const typeSelect = document.getElementById('typeSelect');
  const selectedOpt = typeSelect.options[typeSelect.selectedIndex];
  const paramKey = selectedOpt.getAttribute('data-param');
  const typeId = typeSelect.value;
  
  document.getElementById('fetchBtn').disabled = true;
  document.getElementById('stopBtn').style.display = 'block';
  document.getElementById('allTab').innerHTML = "";
  
  let page = 1;

  while (isFetching) {
    document.getElementById('status').innerText = `PAGE ${page}`;
    try {
      const res = await smartFetch(`${API_BASE}/v2/question/${chapterId}?page=${page}&${paramKey}=${typeId}`);
      const json = await res.json();
      const qs = json?.data?.questions || [];
      if (qs.length === 0) break;

      qs.forEach(q => {
        const textContent = getCleanContent(q.question_text);
        if (!textContent || textContent.trim() === "") return;

        const tags = (q.question_subsources || []).map(s => {
          const board = s.sub_source?.name || "";
          const year = s.year?.name || "";
          return (board || year) ? `<span class="badge">${board} ${year}</span>` : "";
        }).join(' ');

        let extra = "";
        if (q.option && q.option.length > 0) {
          extra = `<div class="vertical-options">` + q.option.map((o, index) => {
            const content = getCleanContent(o);
            const label = BENGALI_LABELS[index] || (index + 1) + ".";
            return content ? `<div class="option-row"><span class="option-label">${label}</span><span>${content}</span></div>` : "";
          }).join('') + `</div>`;
        } else if (q.sub_questions && q.sub_questions.length > 0) {
          extra = `<div class="vertical-options">` + q.sub_questions.map((sq, index) => {
            const content = getCleanContent(sq.question_text);
            const label = BENGALI_LABELS[index] || (index + 1) + ".";
            return content ? `<div class="option-row"><span class="option-label">${label}</span><span>${content}</span></div>` : "";
          }).join('') + `</div>`;
        }

        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
          <div class="q-header">
            <input type="checkbox" onchange="updateSelected()" style="width:20px; height:20px;">
            <div><strong>${globalCount}.</strong> ${textContent}</div>
          </div>
          ${tags ? `<div class="meta-info">${tags}</div>` : ''}
          ${extra}
        `;
        document.getElementById('allTab').appendChild(div);
        globalCount++;
      });
      page++;
      await new Promise(r => setTimeout(r, 100));
    } catch (err) { break; }
  }

  isFetching = false;
  document.getElementById('status').innerText = "COMPLETED";
  document.getElementById('fetchBtn').disabled = false;
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('tabs').style.display = 'flex';
  if (window.MathJax) MathJax.typesetPromise();
}

function updateSelected() {
  const selectedDiv = document.getElementById('selectedTab');
  selectedDiv.innerHTML = "";
  let count = 1;
  document.querySelectorAll('#allTab .question-card').forEach(card => {
    if (card.querySelector('input').checked) {
      const clone = card.cloneNode(true);
      clone.querySelector('input').remove();
      clone.querySelector('strong').innerText = `${count}. `;
      selectedDiv.appendChild(clone);
      count++;
    }
  });
}

function showTab(tab, e) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('allTab').classList.toggle('hidden', tab !== 'all');
  document.getElementById('selectedTab').classList.toggle('hidden', tab === 'all');
}

init();
</script>
</body>
</html>
