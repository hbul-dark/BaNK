<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Question Bank Pro by ARE</title>

<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], processEscapes: true }
  };

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { 
  font-family: 'Segoe UI', Arial, sans-serif; 
  max-width: 100%; 
  margin: 0; 
  background: #f4f7f9; 
  padding: 10px; 
}
.container { width: 100%; max-width: 800px; margin: auto; }
h2 { text-align: center; color: #2c3e50; font-size: 1.4rem; }
select, button { 
  width: 100%; padding: 14px; margin: 5px 0; border-radius: 10px; 
  border: 1px solid #ccc; font-size: 16px; background: #fff;
  text-align-last: center;
}
button { background: #4a90e2; color: #fff; border: none; font-weight: 600; cursor: pointer; }
button:disabled { background: #ccc; }
#stopBtn { background: #e74c3c; display: none; }

.question-card { 
  padding: 15px; border-radius: 12px; margin-bottom: 15px; 
  background: #fff; border: 1px solid #e1e8ef; line-height: 1.6; 
}
.q-header { display: flex; align-items: flex-start; gap: 10px; font-size: 17px; color: #1a1a1a; }
.meta-info { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
.badge {
  background: #e8f5e9;   /* light green background */
  color: #2e7d32;        /* dark green text */
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.8rem;
  border: 1px solid #2e7d32;
  font-weight: bold;     /* 👈 makes text bold */
}

.vertical-options { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; padding-left: 5px; }
.option-row { display: flex; gap: 12px; align-items: flex-start; }
.option-label { font-weight: bold; min-width: 25px; color: #444; }
.q-image { max-width: 100%; height: auto; display: block; margin: 10px 0; border-radius: 6px; }

.tabs { display: flex; gap: 10px; margin: 15px 0; }
.tab { flex: 1; padding: 12px; background: #ddd; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; }
.tab.active { background: #4a90e2; color: #fff; }
.hidden { display: none; }
marquee {
  color: green;
}

/* Style for the text container inside the marquee */
marquee span {
  font-weight: bold;
  border: 1px solid red;
  padding: 1px 2px;
  display: inline-block; /* Ensures the border wraps the text tightly */
}
#status { text-align: center; font-weight: bold; color: #4a90e2; margin: 10px 0; }
</style>
</head>
<body>

<div class="container">
  <h2>📖 QUESTION STORE</h2>
  <marquee>
  <span>| NOTE : Dear user this site created by Author 'ARE' for your education exploration. Thank You.. |</span></marquee>
  
  <select id="subjectSelect"><option value="">LOADING SUBJECTS...</option></select>
  <select id="chapterSelect" disabled><option value="">SELECT CHAPTER</option></select>
  <select id="typeSelect" disabled><option value="">SELECT TYPE</option></select>

  <button id="fetchBtn" disabled onclick="startFetching()">Search Questions</button>
  <button id="stopBtn" onclick="stopFetching()">Stop Searching</button>
  
  <div id="status">READY</div>

  <div class="tabs" style="display:none;" id="tabs">
    <div class="tab active" onclick="showTab('all', event)">All</div>
    <div class="tab" onclick="showTab('selected', event)">Selected</div>
  </div>

  <div id="allTab"></div>
  <div id="selectedTab" class="hidden"></div>
</div>

<script>
const API_BASE = "https://api.daricomma.com";
const AUTH_TOKEN = "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyZWdpc3RyYXRpb25fZGF0ZSI6IjIwMjQtMDEtMjlUMDk6NTc6NDMuMjg2WiIsImlkIjoiMzczN2FjMjYtNjYyNS00MzJmLTgzMTktNmJmNTJmM2NhNDFjIiwiZnVsbG5hbWUiOiJSYXNlbCIsInJvbGUiOiJ2aXNpdG9yIiwiZW1haWwiOm51bGwsIm1vYmlsZSI6IjAxODE3MTY2MTY4IiwiaHR0cHM6Ly9oYXN1cmEuaW8vand0L2NsYWltcyI6eyJ4LWhhc3VyYS1hbGxvd2VkLXJvbGVzIjpbInZpc2l0b3IiXSwieC1oYXN1cmEtZGVmYXVsdC1yb2xlIjoidmlzaXRvciIsIngtaGFzdXJhLXVzZXItaWQiOiIzNzM3YWMyNi02NjI1LTQzMmYtODMxOS02YmY1MmYzY2E0MWMiLCJ4LWhhc3VyYS11c2VyLXJvbGUiOiJ2aXNpdG9yIiwieC1oYXN1cmEtdXNlci1lbWFpbCI6bnVsbCwieC1oYXN1cmEtdXNlci1tb2JpbGUiOiIwMTgxNzE2NjE2OCJ9LCJ0b2tlblR5cGUiOiJhY2Nlc3MiLCJpYXQiOjE3NzY4Mzc4NzIsImV4cCI6MTc3NzQ0MjY3Mn0.Q4f9WXun23iO4U5wCJQAAdhFVgC4Q5Q60rUZjHjljYA";
const headers = { "Authorization": AUTH_TOKEN, "Accept": "application/json" };

let subjectData = [], isFetching = false, globalCount = 1;
// Added Labels Array
const BENGALI_LABELS = ['ক.', 'খ.', 'গ.', 'ঘ.', 'ঙ.', 'চ.'];

function getCleanContent(data) {
  if (!data || data === "undefined") return "";
  if (data.blocks) {
    let html = "";
    const entityMap = data.entityMap || {};
    data.blocks.forEach((block, index) => {
      let txt = block.text || "";
      html += (index === 0) ? `<span>${txt}</span>` : `<div>${txt}</div>`;
      if (block.entityRanges) {
        block.entityRanges.forEach(range => {
          const entity = entityMap[range.key];
          if (entity?.type === 'IMAGE' && entity.data?.src) html += `<img src="${entity.data.src}" class="q-image">`;
        });
      }
    });
    return html;
  }
  return typeof data === 'string' ? data : (data.text || "");
}

async function init() {
  try {
    const res = await fetch(`${API_BASE}/field`, { headers });
    const json = await res.json();
    json.data.curriculums.forEach(c => c.versions.forEach(v => v.classes.forEach(cls => {
      (cls.groups || []).forEach(g => subjectData.push(...g.subjects));
      subjectData.push(...(cls.subjects || []));
    })));
    const subSelect = document.getElementById('subjectSelect');
    subSelect.innerHTML = '<option value="">SUBJECT</option>';
    subjectData.forEach((s, i) => subSelect.innerHTML += `<option value="${i}">${s.name}</option>`);
  } catch (e) { document.getElementById('status').innerText = "Load Error."; }
}

document.getElementById('subjectSelect').onchange = e => {
  const chaps = subjectData[e.target.value]?.chapters || [];
  const chapSelect = document.getElementById('chapterSelect');
  chapSelect.innerHTML = '<option value="">CHAPTER</option>';
  chaps.forEach(c => chapSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`);
  chapSelect.disabled = false;
};

document.getElementById('chapterSelect').onchange = async (e) => {
  const chapterId = e.target.value;
  const typeSelect = document.getElementById('typeSelect');
  if (!chapterId) return;
  document.getElementById('status').innerText = "LOADING FILTERS...";
  try {
    const res = await fetch(`${API_BASE}/question/filter-options/${chapterId}`, { headers });
    const json = await res.json();
    typeSelect.innerHTML = '<option value="">SELECT TYPE</option>';
    json.types.forEach(type => {
      typeSelect.innerHTML += `<option value="${type.id}">${type.name}</option>`;
    });
    typeSelect.disabled = false;
    document.getElementById('status').innerText = "READY";
  } catch (err) { document.getElementById('status').innerText = "FILTER ERROR"; }
};

document.getElementById('typeSelect').onchange = e => {
  document.getElementById('fetchBtn').disabled = !e.target.value;
};

function stopFetching() { isFetching = false; }

async function startFetching() {
  isFetching = true;
  globalCount = 1;
  const chapterId = document.getElementById('chapterSelect').value;
  const typeId = document.getElementById('typeSelect').value;
  
  document.getElementById('fetchBtn').disabled = true;
  document.getElementById('stopBtn').style.display = 'block';
  document.getElementById('allTab').innerHTML = "";
  
  let page = 1;

  while (isFetching) {
    document.getElementById('status').innerText = `FETCHING PAGE ${page}...`;
    try {
      const res = await fetch(`${API_BASE}/v2/question/${chapterId}?page=${page}&question_type_id[]=${typeId}`, { headers });
      const json = await res.json();
      const qs = json?.data?.questions || [];
      if (qs.length === 0) break;

      qs.forEach(q => {
        const textContent = getCleanContent(q.question_text);
        if (!textContent || textContent.trim() === "") return;

        const tags = (q.question_subsources || []).map(s => {
          const board = s.sub_source?.name || "";
          const year = s.year?.name || "";
          return (board || year) ? `<span class="badge">${board} ${year}</span>` : "";
        }).join(' ');

        let extra = "";
        
        // Handle Options (MCQ)
        if (q.option && q.option.length > 0) {
          extra = `<div class="vertical-options">` + q.option.map((o, index) => {
            const content = getCleanContent(o);
            const label = BENGALI_LABELS[index] || (index + 1) + "."; // Fallback to numbers if labels run out
            return content ? `<div class="option-row"><span class="option-label">${label}</span><span>${content}</span></div>` : "";
          }).join('') + `</div>`;
        } 
        // Handle Sub-Questions (CQ)
        else if (q.sub_questions && q.sub_questions.length > 0) {
          extra = `<div class="vertical-options">` + q.sub_questions.map((sq, index) => {
            const content = getCleanContent(sq.question_text);
            const label = BENGALI_LABELS[index] || (index + 1) + ".";
            return content ? `<div class="option-row"><span class="option-label">${label}</span><span>${content}</span></div>` : "";
          }).join('') + `</div>`;
        }

        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
          <div class="q-header">
            <input type="checkbox" onchange="updateSelected()" style="width:20px; height:20px;">
            <div><strong>${globalCount}.</strong> ${textContent}</div>
          </div>
          ${tags ? `<div class="meta-info">${tags}</div>` : ''}
          ${extra}
        `;
        document.getElementById('allTab').appendChild(div);
        globalCount++;
      });
      page++;
      await new Promise(r => setTimeout(r, 100));
    } catch (err) { break; }
  }

  isFetching = false;
  document.getElementById('status').innerText = "COMPLETED";
  document.getElementById('fetchBtn').disabled = false;
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('tabs').style.display = 'flex';
  if (window.MathJax) MathJax.typesetPromise();
}

function updateSelected() {
  const selectedDiv = document.getElementById('selectedTab');
  selectedDiv.innerHTML = "";
  let count = 1;
  document.querySelectorAll('#allTab .question-card').forEach(card => {
    if (card.querySelector('input').checked) {
      const clone = card.cloneNode(true);
      clone.querySelector('input').remove();
      clone.querySelector('strong').innerText = `${count}. `;
      selectedDiv.appendChild(clone);
      count++;
    }
  });
}

function showTab(tab, e) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('allTab').classList.toggle('hidden', tab !== 'all');
  document.getElementById('selectedTab').classList.toggle('hidden', tab === 'all');
}

init();
</script>
</body>
</html>
